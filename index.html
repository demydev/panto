<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/logo.svg">
</head>

<body>
    <section class="hero-div">
        <div class="container con-hero">
            <div class="nav">
                <p class="nav-panto-text-logo">Panto</p>
                <div class="nav-wrap-list">
                    <p class="nav-wrap-text">Furniture</p>
                    <p class="nav-wrap-text">Shop</p>
                    <p class="nav-wrap-text">About Us</p>
                    <p class="nav-wrap-text">Contact</p>
                </div>
                <div class="bag-wrap">
                    <img src="img/Bag.png" alt="">
                </div>
            </div>
            <div class="hero-div-body">
                <p class="hero-big-text">Make Your Interior More <br> Minimalistic & Modern</p>
                <p class="hero-thin-text">Turn your room with panto into a lot more minimalist <br> and modern with ease and speed</p>
                <div class="wrap-search-furniture">
                    <input type="text" class="search-furniture" placeholder="Search furniture">
                    <img id="search-but" src="img/search-icon.png" alt="">
                </div>  
            </div>
        </div>
    </section>
</body>

</html>
